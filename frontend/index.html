<!DOCTYPE html>
<html lang="es" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PIGE - Acceso</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#0f172a">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          animation: {
            'fade-in': 'fadeIn 0.6s ease-out',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(20px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            float: {
              '0%, 100%': { transform: 'translateY(0)' },
              '50%': { transform: 'translateY(-20px)' },
            }
          }
        }
      }
    }
  </script>
  <style>
    .glass-login {
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .gradient-animated {
      background: linear-gradient(-45deg, #0f172a, #1e3a8a, #312e81, #0f172a);
      background-size: 400% 400%;
      animation: gradientBG 15s ease infinite;
    }
    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }
    .input-glow:focus {
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.3);
    }
  </style>
</head>
<body class="gradient-animated min-h-screen flex items-center justify-center p-4">
  <div class="fixed inset-0 overflow-hidden pointer-events-none">
    <div class="absolute top-1/4 left-1/4 w-64 h-64 bg-blue-500/20 rounded-full blur-3xl animate-float"></div>
    <div class="absolute bottom-1/4 right-1/4 w-96 h-96 bg-purple-500/20 rounded-full blur-3xl animate-float" style="animation-delay: 2s;"></div>
  </div>

  <div class="glass-login rounded-3xl p-8 w-full max-w-md animate-fade-in relative z-10">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-gradient-to-br from-blue-400 to-purple-600 rounded-2xl mx-auto mb-4 flex items-center justify-center shadow-lg shadow-blue-500/30">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>
      </div>
      <h1 class="text-3xl font-bold text-white mb-2 tracking-tight">PIGE</h1>
      <p class="text-slate-300 text-sm">Plataforma Inteligente para la Gestión Educativa</p>
    </div>

    <form id="login-form" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Correo electrónico</label>
        <input type="email" id="email" required 
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-slate-400 focus:outline-none input-glow transition"
          placeholder="admin@pige.mx">
      </div>
      <div>
        <label class="block text-sm font-medium text-slate-300 mb-2">Contraseña</label>
        <input type="password" id="password" required 
          class="w-full px-4 py-3 rounded-xl bg-white/10 border border-white/20 text-white placeholder-slate-400 focus:outline-none input-glow transition"
          placeholder="••••••••">
      </div>
      <button type="submit" 
        class="w-full py-3 px-4 bg-gradient-to-r from-blue-500 to-purple-600 hover:from-blue-600 hover:to-purple-700 text-white font-semibold rounded-xl shadow-lg shadow-blue-500/30 transition transform hover:scale-[1.02] active:scale-[0.98]">
        Iniciar Sesión
      </button>
    </form>

    <div class="mt-6 flex flex-col gap-3">
      <button id="guest-btn" 
        class="w-full py-2.5 px-4 bg-white/5 hover:bg-white/10 border border-white/10 text-slate-300 font-medium rounded-xl transition">
        🔍 Explorar como Invitado
      </button>
      <div class="flex justify-center">
        <button id="theme-toggle" class="text-slate-400 hover:text-white transition text-sm">
          Cambiar tema
        </button>
      </div>
    </div>

    <div id="error-msg" class="mt-4 p-3 rounded-lg bg-red-500/20 border border-red-500/30 text-red-200 text-sm hidden text-center"></div>
  </div>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
    
    document.getElementById('theme-toggle').addEventListener('click', () => {
      document.documentElement.classList.toggle('dark');
    });

    document.getElementById('guest-btn').addEventListener('click', () => {
      localStorage.setItem('user', JSON.stringify({rol: 'invitado', nombre: 'Invitado'}));
      window.location.href = '/app.html#/mapa';
    });

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const errorMsg = document.getElementById('error-msg');
      
      try {
        const response = await fetch('http://localhost:8000/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/x-www-form-urlencoded'},
          body: new URLSearchParams({username: email, password})
        });
        const data = await response.json();
        if (data.access_token) {
          localStorage.setItem('access_token', data.access_token);
          localStorage.setItem('user', JSON.stringify(data.usuario));
          window.location.href = '/app.html';
        } else {
          throw new Error('Credenciales incorrectas');
        }
      } catch (err) {
        errorMsg.textContent = err.message || 'Error de conexión con el servidor';
        errorMsg.classList.remove('hidden');
      }
    });
  </script>
</body>
</html>
